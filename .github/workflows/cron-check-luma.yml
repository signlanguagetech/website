name: Check Luma Events

on:
  schedule:
    - cron: '0 9 * * 1'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check-event:
    if: github.repository == 'signlanguagetech/website'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile

      - name: Check for new Luma event
        run: bun scripts/checkLumaEvent.ts

      - name: Commit cache if event changed
        run: |
          if git diff --quiet src/data/luma-event-cache.json; then
            echo "No change, skip"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/luma-event-cache.json
          git commit -m "chore: update luma event cache"
          git push
