name: Check Luma Events

on:
  schedule:
    - cron: '0 9 * * 1'
  workflow_dispatch:

permissions: {}

concurrency:
  group: check-luma-event
  cancel-in-progress: false

jobs:
  check-event:
    if: github.repository == 'signlanguagetech/website'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          version: latest

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 'lts/*'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Check for new Luma event
        run: pnpm exec tsx scripts/checkLumaEvent.ts

      - name: Commit cache if event changed
        run: |
          if git diff --quiet src/data/luma-event-cache.json; then
            echo "No change, skip"
            exit 0
          fi
          git -c user.name="github-actions[bot]" \
              -c user.email="41898282+github-actions[bot]@users.noreply.github.com" \
              commit -am "chore: update luma event cache [skip ci]"
          git push
