name: Check Luma Events

on:
  schedule:
    - cron: '0 9 * * 1'
  workflow_dispatch:

permissions: {}

concurrency:
  group: check-luma-event
  cancel-in-progress: false

jobs:
  check-event:
    if: github.repository == 'signlanguagetech/website'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 11

      - uses: actions/setup-node@v6
        with:
          node-version: 'lts/*'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Check for new Luma event
        run: pnpm exec tsx scripts/checkLumaEvent.ts

      - name: Commit cache if event changed
        run: |
          if git diff --quiet src/data/luma-event-cache.json; then
            echo "No change, skip"
            exit 0
          fi
          git -c user.name="github-actions[bot]" \
              -c user.email="41898282+github-actions[bot]@users.noreply.github.com" \
              commit -am "chore: update luma event cache [skip ci]"
          git push
