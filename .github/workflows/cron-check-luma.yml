name: Check Luma Events

on:
  schedule:
    # 09:00 UTC every Monday
    - cron: '0 9 * * 1'
  workflow_dispatch:

permissions: {}

concurrency:
  group: check-luma-event
  cancel-in-progress: false

jobs:
  check-event:
    if: github.repository == 'signlanguagetech/website'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 'lts/*'
          cache: 'pnpm'

      - name: Install deps
        run: pnpm install --frozen-lockfile
        timeout-minutes: 5

      - name: Check for new Luma event
        uses: nick-fields/retry@v3
        with:
          max_attempts: 3
          timeout_minutes: 5
          command: pnpm exec tsx scripts/checkLumaEvent.ts

      - name: Open PR if cache changed
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'chore: update luma event cache [skip ci]'
          title: 'chore: update luma event cache'
          body: |
            Auto-generated by `cron-check-luma` workflow.
            Updates `src/data/luma-event-cache.json` with latest Luma event.
          branch: bot/luma-event-cache
          delete-branch: true
          author: 'github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>'
          committer: 'github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>'
          add-paths: |
            src/data/luma-event-cache.json
